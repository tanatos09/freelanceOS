{% extends "base.html" %}
{% block title %}Přihlášení – FreelanceOS{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">FreelanceOS</div>
    <div class="auth-tagline">Přihlaste se do svého workspace</div>

    <div id="alert" class="alert alert-error"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="vas@email.cz" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Heslo</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">Přihlásit se</button>
    </form>

    <div class="auth-footer">
      Nemáte účet? <a href="/accounts/register/">Registrovat se</a>
    </div>
  </div>
</div>

<script>
  // Pokud je uživatel již přihlášen, přesměruj
  if (localStorage.getItem('access_token')) {
    window.location.href = '/accounts/dashboard/';
  }

  const form = document.getElementById('loginForm');
  const alert = document.getElementById('alert');
  const btn = document.getElementById('submitBtn');

  function showError(msg) {
    alert.textContent = msg;
    alert.className = 'alert alert-error show';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alert.className = 'alert';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Přihlašování…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/v1/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Přihlášení selhalo.');
        return;
      }

      localStorage.setItem('access_token', data.access);
      localStorage.setItem('refresh_token', data.refresh);
      localStorage.setItem('user', JSON.stringify(data.user));

      window.location.href = '/accounts/dashboard/';
    } catch {
      showError('Chyba sítě. Zkuste to znovu.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Přihlásit se';
    }
  });
</script>
{% endblock %}
