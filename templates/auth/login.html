{% extends "base.html" %}
{% block title %}Přihlášení – FreelanceOS{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">FreelanceOS</div>
    <div class="auth-tagline">Přihlaste se do svého workspace</div>

    <div id="alert" class="alert alert-error"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="vas@email.cz" autocomplete="email" required />
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Heslo</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        <div class="form-error"></div>
      </div>
      <button type="submit" class="btn" id="submitBtn">Přihlásit se</button>
    </form>

    <div class="auth-footer">
      Nemáte účet? <a href="/accounts/register/">Registrovat se</a>
    </div>
  </div>
</div>

<script>
  // Pokud je uživatel již přihlášen, přesměruj
  if (localStorage.getItem('access_token')) {
    window.location.href = '/accounts/dashboard/';
  }

  const form = document.getElementById('loginForm');
  const alertEl = document.getElementById('alert');
  const btn = document.getElementById('submitBtn');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');

  function showAlert(msg) {
    alertEl.textContent = msg;
    alertEl.className = 'alert alert-error show';
  }

  function clearAlert() {
    alertEl.className = 'alert';
  }

  function setFieldError(inputEl, msg) {
    const group = inputEl.closest('.form-group');
    if (!group) return;
    const errorEl = group.querySelector('.form-error');
    if (errorEl) errorEl.textContent = msg;
    if (msg) {
      group.classList.add('error');
    } else {
      group.classList.remove('error');
    }
  }

  function validateField(inputEl) {
    const value = inputEl.value.trim();
    if (!value) {
      setFieldError(inputEl, 'Toto pole je povinné.');
      return false;
    }
    if (inputEl.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
      setFieldError(inputEl, 'Zadejte platný e-mail.');
      return false;
    }
    setFieldError(inputEl, '');
    return true;
  }

  emailEl.addEventListener('blur', function () { validateField(this); });
  passwordEl.addEventListener('blur', function () { validateField(this); });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert();
    const emailOk = validateField(emailEl);
    const passwordOk = validateField(passwordEl);
    if (!emailOk || !passwordOk) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Přihlašování…';

    const email = emailEl.value.trim();
    const password = passwordEl.value;

    try {
      const res = await fetch('/api/v1/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.detail || 'Přihlášení selhalo.');
        return;
      }

      localStorage.setItem('access_token', data.access);
      localStorage.setItem('refresh_token', data.refresh);
      localStorage.setItem('user', JSON.stringify(data.user));

      window.location.href = '/accounts/dashboard/';
    } catch {
      showAlert('Chyba sítě. Zkuste to znovu.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Přihlásit se';
    }
  });
</script>
{% endblock %}
