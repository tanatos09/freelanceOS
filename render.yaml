databases:
  - name: freelanceos-db
    databaseName: freelanceos
    user: freelanceos_admin
    plan: free

services:
  - type: web
    name: freelanceos-api
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: freelanceos-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://freelanceos-ptic.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"
