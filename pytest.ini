[pytest]
# Pytest konfigurace pro freelanceOS projekt

# Direktorie s testy
testpaths = tests users/tests clients/tests projects/tests

# Python soubory k testování
python_files = test_*.py

# Test funkcí a tříd
python_classes = Test*
python_functions = test_*

# Markery
markers =
    unit: jednotkové testy (modely, serializers)
    integration: integrační testy (API endpointy)
    edge_cases: testy edge cases a extrémních situací
    slow: pomalé testy (více než 1 sekunda)

# Django specifické
DJANGO_SETTINGS_MODULE = core.settings
django_find_project = false
pythonpath = .

# Přidá výstupní informace
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=users,clients,projects,apps
    --cov-report=html
    --cov-report=term-missing
    --cov-branch
    -p no:cacheprovider

# Timeout pro testy
timeout = 10

# Failure display
console_output_style = progress

# Logi
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG
